<div class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <p class="mb-3 text-gray-600">Did you keep your promise today?</p>
    @if (completed()) {
        <p class="font-medium text-green-600" role="status">You already completed this commitment today.</p>
    } @else {
        <button
            type="button"
            class="flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 text-base font-semibold text-white transition hover:bg-indigo-700 disabled:opacity-50 disabled:hover:bg-indigo-600"
            [disabled]="alreadyCheckedToday() || disabled()"
            (click)="checkIn.emit()"
        >
            <span aria-hidden="true">✔</span>
            YES, I DID
        </button>
    }
</div>
