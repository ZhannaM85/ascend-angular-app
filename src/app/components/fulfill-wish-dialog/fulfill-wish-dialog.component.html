@if (wishToFulfill(); as wish) {
    <div
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4"
        role="dialog"
        aria-modal="true"
        aria-labelledby="fulfill-dialog-title"
    >
        <div class="w-full max-w-md rounded-xl bg-white p-6 shadow-xl">
            <h2 id="fulfill-dialog-title" class="text-lg font-bold text-gray-900">
                {{ 'fulfillWishDialog.title' | translate }}
            </h2>
            <p class="mt-2 text-gray-600">{{ 'fulfillWishDialog.whenDidItHappen' | translate }}</p>
            <form [formGroup]="form" (ngSubmit)="save()" class="mt-4 space-y-4">
                <div>
                    <label for="fulfilledDate" class="mb-1 block text-sm font-medium text-gray-700">{{ 'fulfillWishDialog.date' | translate }}</label>
                    <input
                        id="fulfilledDate"
                        type="date"
                        formControlName="fulfilledDate"
                        class="w-full rounded-xl border border-gray-300 px-4 py-3 text-gray-900 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                    />
                </div>
                <div>
                    <label for="fulfillNote" class="mb-1 block text-sm font-medium text-gray-700">{{ 'fulfillWishDialog.addNoteOptional' | translate }}</label>
                    <textarea
                        id="fulfillNote"
                        formControlName="note"
                        rows="3"
                        class="w-full rounded-xl border border-gray-300 px-4 py-3 text-gray-900 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                        [placeholder]="'fulfillWishDialog.whatHappened' | translate"
                    ></textarea>
                </div>
                <div class="flex gap-2">
                    <button
                        type="submit"
                        class="flex-1 rounded-xl bg-indigo-600 py-3 font-medium text-white hover:bg-indigo-700"
                    >
                        {{ 'fulfillWishDialog.save' | translate }}
                    </button>
                    <button
                        type="button"
                        class="rounded-xl border border-gray-300 bg-white px-4 py-3 font-medium text-gray-700 hover:bg-gray-100"
                        (click)="close()"
                    >
                        {{ 'fulfillWishDialog.cancel' | translate }}
                    </button>
                </div>
            </form>
        </div>
    </div>
}
