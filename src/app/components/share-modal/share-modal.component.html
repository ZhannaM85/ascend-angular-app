@if (shareState(); as ctx) {
    <div
        class="share-modal-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="share-dialog-title"
    >
        <div class="share-modal-panel">
            <h2 id="share-dialog-title" class="sr-only">{{ 'shareModal.shareProgressCard' | translate }}</h2>
            <div class="share-modal-cardWrap" aria-hidden="true">
                <div class="share-modal-cardScale">
                    <app-share-card [wish]="ctx.wish" [commitment]="ctx.commitment" />
                </div>
            </div>
            <div class="share-modal-actions">
                <div class="flex flex-wrap justify-center gap-3">
                    <button
                        type="button"
                        class="rounded-xl bg-indigo-600 px-6 py-3 font-medium text-white hover:bg-indigo-700"
                        (click)="download()"
                    >
                        {{ 'shareModal.download' | translate }}
                    </button>
                    <button
                        type="button"
                        class="rounded-xl border border-white bg-white px-6 py-3 font-medium text-gray-800 hover:bg-gray-100"
                        (click)="share()"
                    >
                        {{ 'shareModal.share' | translate }}
                    </button>
                    <button
                        type="button"
                        class="rounded-xl border border-gray-300 bg-white px-6 py-3 font-medium text-gray-700 hover:bg-gray-100"
                        (click)="close()"
                    >
                        {{ 'shareModal.close' | translate }}
                    </button>
                </div>
            </div>
        </div>
    </div>
}
