@if (shareState(); as ctx) {
    <div
        class="share-modal-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="share-dialog-title"
    >
        <div class="share-modal-panel">
            <h2 id="share-dialog-title" class="sr-only">{{ 'shareModal.shareProgressCard' | translate }}</h2>
            <div class="share-modal-cardWrap" aria-hidden="true">
                <div class="share-modal-iconActions" aria-label="{{ 'shareModal.shareProgressCard' | translate }}">
                    <button
                        type="button"
                        class="share-modal-iconButton"
                        (click)="download()"
                        [attr.aria-label]="'shareModal.download' | translate"
                    >
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                            <path
                                fill="currentColor"
                                d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42L11 12.59V4a1 1 0 0 1 1-1Zm-7 14a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z"
                            />
                        </svg>
                    </button>
                    <button
                        type="button"
                        class="share-modal-iconButton"
                        (click)="share()"
                        [attr.aria-label]="'shareModal.share' | translate"
                    >
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                            <path
                                fill="currentColor"
                                d="M18 16a3 3 0 0 0-2.39 1.2l-6.4-3.2a3.1 3.1 0 0 0 0-1.99l6.4-3.2A3 3 0 1 0 15 7a3 3 0 0 0 .06.6l-6.4 3.2a3 3 0 1 0 0 4.4l6.4 3.2A3 3 0 1 0 18 16Z"
                            />
                        </svg>
                    </button>
                    <button
                        type="button"
                        class="share-modal-iconButton"
                        (click)="close()"
                        [attr.aria-label]="'shareModal.close' | translate"
                    >
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                            <path
                                fill="currentColor"
                                d="M18.3 5.7a1 1 0 0 1 0 1.4L13.4 12l4.9 4.9a1 1 0 1 1-1.4 1.4L12 13.4l-4.9 4.9a1 1 0 0 1-1.4-1.4l4.9-4.9-4.9-4.9a1 1 0 0 1 1.4-1.4L12 10.6l4.9-4.9a1 1 0 0 1 1.4 0Z"
                            />
                        </svg>
                    </button>
                </div>
                <div class="share-modal-cardScale">
                    <app-share-card [wish]="ctx.wish" [commitment]="ctx.commitment" />
                </div>
            </div>
        </div>
    </div>
}
