@if (reflectionToDelete(); as reflection) {
    <div
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4"
        role="dialog"
        aria-modal="true"
        aria-labelledby="delete-reflection-dialog-title"
        aria-describedby="delete-reflection-dialog-description"
    >
        <div class="w-full max-w-md rounded-xl bg-white p-6 shadow-xl">
            <h2 id="delete-reflection-dialog-title" class="text-lg font-bold text-gray-900">
                Delete reflection?
            </h2>
            <p id="delete-reflection-dialog-description" class="mt-2 text-gray-600">
                This reflection from {{ formatDate(reflection.date) }} will be permanently removed.
            </p>
            @if (reflection.text) {
                <p class="mt-2 rounded-lg bg-gray-100 p-3 text-sm text-gray-700 line-clamp-3">
                    "{{ reflection.text }}"
                </p>
            }
            <div class="mt-6 flex flex-wrap gap-2">
                <button
                    type="button"
                    class="flex-1 min-w-[7rem] rounded-xl border border-red-200 bg-white py-3 font-medium text-red-600 transition hover:bg-red-50"
                    (click)="confirmDelete()"
                >
                    Delete
                </button>
                <button
                    type="button"
                    class="flex-1 min-w-[7rem] rounded-xl border border-gray-300 bg-white py-3 font-medium text-gray-700 transition hover:bg-gray-100"
                    (click)="close()"
                >
                    Cancel
                </button>
            </div>
        </div>
    </div>
}
