<div class="flex flex-wrap gap-2">
    @for (day of days(); track day.dayIndex) {
        <button
            type="button"
            class="flex h-10 w-10 flex-col items-center justify-center rounded-full text-sm"
            [class.bg-green-100]="day.status === 'checked'"
            [class.text-green-800]="day.status === 'checked'"
            [class.bg-gray-200]="day.status === 'missed'"
            [class.text-gray-600]="day.status === 'missed'"
            [class.bg-indigo-100]="day.status === 'future'"
            [class.text-indigo-700]="day.status === 'future'"
            [attr.aria-label]="'streakCalendar.dayStatus' | translate:{ index: day.dayIndex, status: getStatusLabel(day.status) }"
            [attr.aria-pressed]="day.status === 'checked'"
            [disabled]="day.status === 'future'"
            (click)="onToggle(day.dayIndex)"
        >
            <span class="text-xs">{{ day.label }}</span>
            @if (day.status === 'checked') {
                <span aria-hidden="true">✅</span>
            } @else if (day.status === 'missed') {
                <span aria-hidden="true">❌</span>
            } @else {
                <span aria-hidden="true">⏳</span>
            }
        </button>
    }
</div>
