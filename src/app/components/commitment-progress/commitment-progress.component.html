@let c = commitment();
<div class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <p class="mb-2 text-xs font-medium uppercase tracking-wide text-gray-500">{{ 'commitmentProgress.commitment' | translate }}</p>
    <p class="mb-3 text-lg font-medium text-gray-900">
        <span aria-hidden="true">✨</span> {{ c.title }}
    </p>
    <app-progress-bar [current]="c.streak" [total]="c.duration" />
    <div class="mt-2">
        <app-streak-badge [streak]="c.streak" />
    </div>
    @if (showKeepGoing() && !c.completed && c.streak > 0) {
        <p class="mt-2 text-sm text-gray-600">{{ 'commitmentProgress.keepStreakGoing' | translate }}</p>
    }
</div>
