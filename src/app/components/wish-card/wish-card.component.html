@let w = wish();
@let c = commitment();
<article class="relative flex h-full min-w-0 max-w-full flex-col overflow-hidden rounded-xl border border-gray-200 bg-white p-4 shadow-md box-border transition hover:shadow-lg">
    <button
        type="button"
        class="absolute right-4 top-4 z-10 inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg border border-red-200 bg-white text-red-600 transition hover:bg-red-50"
        (click)="deleteClick.emit()"
        [attr.aria-label]="'Delete wish ' + w.title"
    >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" />
        </svg>
    </button>
    <div class="mb-3 h-32 w-full shrink-0 overflow-hidden rounded-lg border border-indigo-100 bg-indigo-50">
        @if (w.imageDataUrl) {
            <img
                [src]="w.imageDataUrl"
                alt=""
                class="h-full w-full object-cover"
            />
        } @else {
            <div class="flex h-full w-full items-center justify-center text-indigo-300" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
            </div>
        }
    </div>
    <h2
        class="mb-1 truncate pr-10 text-lg font-semibold text-gray-900"
        [appTruncateTooltip]="w.title"
    >
        <span aria-hidden="true">✨</span> {{ w.title }}
    </h2>
    @if (c) {
        <p
            class="mb-2 min-h-10 min-w-0 text-sm text-gray-600 line-clamp-2 break-words"
            [appTruncateTooltip]="'Commitment: ' + c.title"
        >Commitment: {{ c.title }}</p>
        <div class="min-w-0">
            <app-progress-bar [current]="c.streak" [total]="c.duration" />
        </div>
        <div class="mt-2 min-w-0">
            <app-streak-badge [streak]="c.streak" />
        </div>
        @if (c.completed) {
            <p class="mt-2 text-sm font-medium text-green-600" role="status">🎉 Commitment completed</p>
        }
        <div class="mt-auto flex w-full min-w-0 flex-col gap-2 pt-4 sm:flex-row sm:flex-wrap">
            <a
                [routerLink]="['/wish', w.id]"
                class="inline-flex h-12 w-full min-w-0 items-center justify-center rounded-xl bg-indigo-600 px-4 text-sm font-medium text-white transition hover:bg-indigo-700 box-border sm:w-auto sm:flex-1"
            >
                Open
            </a>
            <button
                type="button"
                class="inline-flex h-12 w-full min-w-0 items-center justify-center rounded-xl border border-indigo-600 bg-white px-4 text-sm font-medium text-indigo-600 transition hover:bg-indigo-50 box-border sm:w-auto sm:flex-1"
                (click)="shareClick.emit()"
            >
                Share
            </button>
        </div>
    } @else {
        <div class="mb-2 min-h-10 min-w-0" aria-hidden="true"></div>
        <div class="mt-auto flex w-full min-w-0 flex-col gap-2 pt-4 sm:flex-row sm:flex-wrap">
            <a
                [routerLink]="['/wish', w.id]"
                class="inline-flex h-12 w-full min-w-0 items-center justify-center rounded-xl bg-indigo-600 px-4 text-sm font-medium text-white transition hover:bg-indigo-700 box-border sm:w-auto sm:flex-1"
            >
                Open
            </a>
        </div>
    }
</article>
