@let w = wish();
@let c = commitment();
<article class="w-full min-w-0 max-w-full overflow-hidden rounded-xl border border-gray-200 bg-white p-4 shadow-sm box-border">
    <h2 class="mb-1 truncate text-lg font-semibold text-gray-900">
        <span aria-hidden="true">✨</span> {{ w.title }}
    </h2>
    @if (c) {
        <p class="mb-2 min-w-0 break-words text-sm text-gray-600">Commitment: {{ c.title }}</p>
        <div class="min-w-0">
            <app-progress-bar [current]="c.streak" [total]="c.duration" />
        </div>
        <div class="mt-2 min-w-0">
            <app-streak-badge [streak]="c.streak" />
        </div>
        @if (c.completed) {
            <p class="mt-2 text-sm font-medium text-green-600" role="status">🎉 Commitment completed</p>
        }
        <div class="mt-4 flex w-full min-w-0 flex-col gap-2 sm:flex-row sm:flex-wrap">
            <a
                [routerLink]="['/wish', w.id]"
                class="inline-flex h-12 w-full min-w-0 items-center justify-center rounded-xl bg-indigo-600 px-4 text-sm font-medium text-white transition hover:bg-indigo-700 box-border sm:w-auto sm:flex-1"
            >
                Open
            </a>
            <button
                type="button"
                class="inline-flex h-12 w-full min-w-0 items-center justify-center rounded-xl border border-indigo-600 bg-white px-4 text-sm font-medium text-indigo-600 transition hover:bg-indigo-50 box-border sm:w-auto sm:flex-1"
                (click)="shareClick.emit()"
            >
                Share
            </button>
        </div>
    }
</article>
