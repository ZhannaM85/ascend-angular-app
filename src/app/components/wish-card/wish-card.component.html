@let w = wish();
@let c = commitment();
<article class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <h2 class="mb-1 text-lg font-semibold text-gray-900">
        <span aria-hidden="true">✨</span> {{ w.title }}
    </h2>
    @if (c) {
        <p class="mb-2 text-sm text-gray-600">Commitment: {{ c.title }}</p>
        <app-progress-bar [current]="c.streak" [total]="c.duration" />
        <div class="mt-2">
            <app-streak-badge [streak]="c.streak" />
        </div>
        @if (c.completed) {
            <p class="mt-2 text-sm font-medium text-green-600" role="status">🎉 Commitment completed</p>
        }
        <div class="mt-4 flex gap-2">
            <a
                [routerLink]="['/wish', w.id]"
                class="inline-flex h-12 items-center justify-center rounded-xl bg-indigo-600 px-4 text-sm font-medium text-white transition hover:bg-indigo-700"
            >
                Open
            </a>
            <button
                type="button"
                class="inline-flex h-12 items-center justify-center rounded-xl border border-indigo-600 bg-white px-4 text-sm font-medium text-indigo-600 transition hover:bg-indigo-50"
                (click)="shareClick.emit()"
            >
                Share
            </button>
        </div>
    }
</article>
