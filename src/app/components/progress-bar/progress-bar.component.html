@let c = current();
@let t = total();
<div class="progress-bar min-w-0">
    @if (showLabel()) {
        <div class="mb-1 flex min-w-0 justify-between gap-2 text-sm text-gray-600">
            <span class="min-w-0 truncate">{{ 'progressBar.progress' | translate }}</span>
            <span class="shrink-0">Day {{ c }} / {{ t }}</span>
        </div>
    }
    <div class="h-3 min-w-0 overflow-hidden rounded-full bg-gray-200" role="progressbar" [attr.aria-valuenow]="c" [attr.aria-valuemin]="0" [attr.aria-valuemax]="t" [attr.aria-label]="'progressBar.dayOfTotal' | translate:{ current: c, total: t }">
        <div
            class="h-full rounded-full bg-green-500 transition-[width] duration-300"
            [style.width.%]="percent()"
        ></div>
    </div>
</div>
