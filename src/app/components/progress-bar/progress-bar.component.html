@let c = current();
@let t = total();
<div class="progress-bar">
    @if (showLabel()) {
        <div class="mb-1 flex justify-between text-sm text-gray-600">
            <span>Progress</span>
            <span>Day {{ c }} / {{ t }}</span>
        </div>
    }
    <div class="h-3 w-full overflow-hidden rounded-full bg-gray-200" role="progressbar" [attr.aria-valuenow]="c" [attr.aria-valuemin]="0" [attr.aria-valuemax]="t" [attr.aria-label]="'Progress: day ' + c + ' of ' + t">
        <div
            class="h-full rounded-full bg-green-500 transition-[width] duration-300"
            [style.width.%]="percent()"
        ></div>
    </div>
</div>
